name: MCP Doctor bug
description: Report a problem with MCP Doctor.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Do not paste real API keys, bearer tokens, or private config values.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the behavior you expected and what happened instead.
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the exact MCP Doctor command you ran. Remove local secrets.
      render: powershell
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Paste the MCP Doctor output. Make sure secrets are masked.
      render: text
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: node --version
    validations:
      required: false
